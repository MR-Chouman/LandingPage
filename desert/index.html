<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Sarra — The Desert Fairy</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@400;700&family=Cormorant+Garamond:ital,wght@0,300;1,300&family=Inter:wght@300;400&display=swap" rel="stylesheet"/>
  <script>
    tailwind.config = {
      theme: { extend: {
        fontFamily: {
          cinzel: ['"Cinzel Decorative"','serif'],
          cormorant:['"Cormorant Garamond"','serif'],
          inter:['Inter','sans-serif']
        },
        keyframes:{
          duneDrift:{'0%,100%':{'transform':'translateX(0)'},'50%':{'transform':'translateX(10px)'}},
          sandFloat:{'0%':{'opacity':'0','transform':'translateY(0)'},'50%':{'opacity':'0.6'},'100%':{'opacity':'0','transform':'translateY(-60px) translateX(20px)'}},
          fairyFloat:{'0%,100%':{'transform':'translateY(0)'},'50%':{'transform':'translateY(-14px)'}},
        },
        animation:{
          'dune':'duneDrift 8s ease-in-out infinite',
          'sand':'sandFloat 5s ease-in-out infinite',
          'float':'fairyFloat 4s ease-in-out infinite',
        }
      }}
    }
  </script>
</head>
<body class="font-cormorant overflow-hidden bg-amber-800 text-amber-50 min-h-screen relative">

  <!-- World Toggle -->
  <nav class="fixed top-5 left-1/2 -translate-x-1/2 z-50 flex items-center gap-1 px-2 py-1.5 rounded-full bg-black/30 backdrop-blur-md border border-white/10">
    <a href="../nature/index.html" class="px-5 py-2 rounded-full font-inter text-[12px] tracking-widest text-white/50 hover:text-white transition-all duration-300">🌿 Nature</a>
    <span class="px-5 py-2 rounded-full font-inter text-[12px] tracking-widest text-white bg-white/15">🏜️ Desert</span>
  </nav>

  <!-- Sky gradient -->
  <div class="absolute inset-0" style="background:linear-gradient(180deg,#92400e 0%,#d97706 40%,#fcd34d 70%,#fef3c7 100%)"></div>

  <!-- Dunes -->
  <div class="absolute bottom-0 left-0 w-full h-[35%] bg-amber-900 animate-dune"
       style="clip-path:ellipse(60% 100% at 50% 100%)"></div>
  <div class="absolute bottom-0 left-0 w-full h-[22%] bg-amber-950"
       style="clip-path:ellipse(65% 100% at 30% 100%)"></div>
  <div class="absolute bottom-0 right-0 w-[60%] h-[28%] bg-amber-900/80"
       style="clip-path:ellipse(70% 100% at 60% 100%)"></div>

  <!-- Sand particles -->
  <div class="absolute inset-0 pointer-events-none">
    <div class="absolute w-1 h-1 rounded-full bg-yellow-200/50 animate-sand" style="left:15%;top:40%;animation-delay:0s"></div>
    <div class="absolute w-1 h-1 rounded-full bg-yellow-200/40 animate-sand" style="left:35%;top:55%;animation-delay:1s"></div>
    <div class="absolute w-1.5 h-1.5 rounded-full bg-amber-200/40 animate-sand" style="left:60%;top:45%;animation-delay:2s"></div>
    <div class="absolute w-1 h-1 rounded-full bg-yellow-100/50 animate-sand" style="left:75%;top:50%;animation-delay:0.5s"></div>
    <div class="absolute w-1 h-1 rounded-full bg-amber-200/40 animate-sand" style="left:85%;top:35%;animation-delay:1.5s"></div>
  </div>

  <!-- Content -->
  <div class="relative z-10 min-h-screen flex flex-col items-center justify-center text-center px-8">
    <!-- Fairy -->
    <div class="text-6xl animate-float mb-6 select-none">🧚‍♀️</div>
    <p class="font-inter text-[11px] tracking-[0.3em] uppercase text-amber-200/50 mb-4">— The Desert Fairy</p>
    <h1 class="font-cinzel mb-4 drop-shadow-2xl"
        style="font-size:clamp(2.5rem,7vw,5.5rem);color:#fef3c7;text-shadow:0 0 60px rgba(255,200,100,0.8)">
      Sarra's World
    </h1>
    <p class="font-cormorant italic text-xl text-amber-100/70 max-w-sm leading-[1.8] mb-8">
      Hanin's page — coming soon 🏜️
    </p>
    <a href="../nature/index.html"
       class="inline-block px-6 py-2.5 rounded-full border border-green-400/40 bg-green-400/10 text-green-300 font-inter text-[11px] tracking-widest hover:bg-green-400/25 transition-all duration-300">
      ← Visit Luma's Nature
    </a>
  </div>

</body>
</html>
